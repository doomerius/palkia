name: Build & Push memory-service

on:
  push:
    paths:
      - 'memory-service/**'
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./memory-service
          push: true
          tags: |
            ghcr.io/doomerius/palkia-memory:latest
            ghcr.io/doomerius/palkia-memory:${{ github.sha }}
